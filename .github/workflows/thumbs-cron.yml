# Keep-warm for the shared thumbnail store (/api/thumb).
#
# Runs on THREE cues, all opt-in behind a repository variable SITE_URL set to
# your Pages URL (Settings → Secrets and variables → Actions → Variables → New:
# SITE_URL = https://your-site.pages.dev). Without it the job no-ops.
#   • push  — every deploy warms only the GAPS (FILL_ONLY=1): brand-new/expired
#             links get captured so the first visitor isn't laggy, while every
#             crop that already exists is preserved exactly — a reorg or redeploy
#             never re-shoots or downgrades your curated thumbnails, and spends no
#             quota on links already covered. (Waits for the deploy to go live so
#             it reads the freshly-deployed world list.)
#   • daily — the FULL refresh + touch-up cycle: re-shoots both slots and
#             re-touches any crop whose capture is down so nothing expires.
#   • manual — runnable on demand from the Actions tab.
# See tools/capture-thumbs.mjs for exactly what each run does to the store.
name: Warm thumbnails

on:
  push:
    branches: [main, console]   # the production branches CF Pages deploys
  schedule:
    - cron: '17 8 * * *'        # daily ~08:17 UTC
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: warm-thumbnails
  cancel-in-progress: false

jobs:
  warm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # A push fires this in parallel with Cloudflare's build; give the new deploy
      # time to go live so the warm reads the freshly-deployed world list and the
      # updated Functions, not the previous version. Skipped for cron/manual runs.
      - name: Wait for the new deploy to go live
        if: github.event_name == 'push'
        run: sleep 150
      # On a push (deploy) warm in FILL-ONLY mode: only new/expired links are
      # captured, every existing crop is preserved as-is (no re-shoot, no quota).
      # The daily/manual run leaves FILL_ONLY unset → full refresh + touch-up.
      - name: Warm the store
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          FILL_ONLY: ${{ github.event_name == 'push' && '1' || '' }}
        run: node tools/capture-thumbs.mjs
