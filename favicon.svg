<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Frutiger Aero bubble — same rim + highlight look as gallery.js bubbleTexture(),
       but with an ice-blue fill and a transparent background outside the bubble. -->
  <defs>
    <radialGradient id="ice" cx="40%" cy="34%" r="72%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="30%"  stop-color="#dff4ff"/>
      <stop offset="68%"  stop-color="#b4e6ff"/>
      <stop offset="100%" stop-color="#7fccff"/>
    </radialGradient>
    <radialGradient id="gloss" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity=".95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- ice-blue glassy fill -->
  <circle cx="32" cy="32" r="29" fill="url(#ice)"/>
  <!-- glossy white rim -->
  <circle cx="32" cy="32" r="29" fill="none" stroke="#ffffff" stroke-opacity=".85" stroke-width="2.5"/>
  <!-- top-left highlight blob -->
  <ellipse cx="23" cy="20" rx="10" ry="7.5" fill="url(#gloss)" transform="rotate(-25 23 20)"/>
  <!-- little sparkle -->
  <circle cx="43" cy="23" r="2.4" fill="#ffffff" fill-opacity=".85"/>
</svg>
