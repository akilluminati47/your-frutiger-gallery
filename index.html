<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Frutiger Gallery ● 3D Gallery</title>
  <meta name="description" content="Step into a Frutiger Aero 3D gallery and walk through to visit each world." />
  <meta name="theme-color" content="#2aa9ff" />

  <!-- ── Favicons / app icons: covers every browser + platform ──
       /favicon.ico also satisfies the bare /favicon.ico request that browsers,
       crawlers and link-preview bots make even with no <link>. -->
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="mask-icon" href="/mask-icon.svg" color="#2aa9ff" />
  <link rel="manifest" href="/site.webmanifest" />

  <!-- ── Apple / Windows tile hints ── -->
  <meta name="apple-mobile-web-app-title" content="Frutiger Gallery" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="application-name" content="Frutiger Gallery" />
  <meta name="msapplication-TileColor" content="#2aa9ff" />
  <meta name="msapplication-TileImage" content="/mstile-150x150.png" />
  <meta name="msapplication-config" content="/browserconfig.xml" />

  <!-- ── Social / link-preview cards (Open Graph + Twitter) ──
       Paths are root-relative; set them to your absolute https URL if you want
       strict crawlers (e.g. Facebook) to always resolve the card image. -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Frutiger Gallery ● 3D Gallery" />
  <meta property="og:description" content="Walk through a Frutiger Aero 3D gallery to visit each world." />
  <meta property="og:image" content="/og-card.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="A glassy Frutiger Aero bubble beside the words Frutiger Gallery." />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Frutiger Gallery ● 3D Gallery" />
  <meta name="twitter:description" content="Walk through a Frutiger Aero 3D gallery to visit each world." />
  <meta name="twitter:image" content="/og-card.png" />

  <link rel="stylesheet" href="styles.css" />

  <!-- Three.js loaded from CDN via import map -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.180.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.180.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <!-- WebGL canvas gets appended here -->
  <div id="scene"></div>

  <!-- Sun-glare bloom: a screen-blend DOM glow tracked to the sun's screen
       position, layered ABOVE the CSS3D live panels so the flare spills over an
       interactive slab instead of being cut off by it (WebGL flare can't). -->
  <div id="sunglow"></div>

  <!-- White "swoop" overlay used for the fade-in / fade-out transitions -->
  <div id="fade"></div>

  <!-- Custom crosshair cursor: follows the mouse on menu/pause screens only
       (hidden in-game so the centre of the view is clear, like real life) -->
  <div id="crosshair"><span class="dot"></span></div>

  <!-- In-world HUD -->
  <div id="hud" class="hidden">
    <div id="prompt"></div>
    <div id="legend">
      <b>WASD</b> / arrows move &nbsp;·&nbsp; <b>mouse</b> look &nbsp;·&nbsp;
      <b>E</b> / click visit &nbsp;·&nbsp; <b>Esc</b> pause
    </div>

    <!-- On-screen touch controls (shown only on touch devices) -->
    <div id="touch" class="hidden">
      <div id="joy"><span id="joyKnob"></span></div>
      <button id="pauseBtn" class="touch-btn" type="button" aria-label="pause">❚❚</button>
      <!-- view lock: freezes walk + look so a live slab takes your finger; glows
           in/out while active. Untoggle to release every lock and roam again. -->
      <button id="viewBtn" class="touch-btn" type="button" aria-label="view lock">👁</button>
    </div>
  </div>

  <!-- Landing / entry card -->
  <div id="enter">
    <div class="glass card">
      <h1 id="title">DIGITAL REALM</h1>
      <p id="subtitle">choose a world to enter</p>
      <button id="enterBtn" class="aero-btn" disabled>✦ Enter the realm ✦</button>
      <p class="fineprint" id="loadnote">Loading the world…</p>
    </div>
  </div>

  <!-- Pause overlay (shown when pointer-lock is released) -->
  <div id="pause" class="hidden">
    <div class="glass card small">
      <h2 id="pauseTitle">Paused</h2>
      <p id="pauseNote">Take a breath.</p>
      <button id="resumeBtn" class="aero-btn">Resume</button>
      <!-- opens the /thumbs cache dashboard (new tab) — see gallery.js -->
      <button id="thumbsBtn" class="aero-btn">thumbs</button>
    </div>
  </div>

  <!-- Fatal-error notice if WebGL / network fails -->
  <div id="oops" class="hidden">
    <div class="glass card small">
      <h2>Couldn't open the realm</h2>
      <p id="oopsmsg"></p>
    </div>
  </div>

  <script type="module" src="gallery.js"></script>
</body>
</html>
